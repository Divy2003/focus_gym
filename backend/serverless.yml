org: divypatel
app: focus-api
service: focus-gym-api

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1
  timeout: 60
  memorySize: 1024
  httpApi:
    payload: '2.0'
    cors: false
  environment:
    MONGODB_URI: ${env:MONGODB_URI}
    JWT_SECRET: ${env:JWT_SECRET}
    MSG91_API_KEY: ${env:MSG91_API_KEY}
    MSG91_TEMPLATE_ID: ${env:MSG91_TEMPLATE_ID}
    MSG91_SENDER_ID: ${env:MSG91_SENDER_ID}
    ADMIN_MOBILE: ${env:ADMIN_MOBILE}
    CLOUDINARY_CLOUD_NAME: ${env:CLOUDINARY_CLOUD_NAME}
    CLOUDINARY_API_KEY: ${env:CLOUDINARY_API_KEY}
    CLOUDINARY_API_SECRET: ${env:CLOUDINARY_API_SECRET}
    NODE_ENV: production

functions:
  api:
    handler: server.handler
    layers:
      - arn:aws:lambda:us-east-1:764866452798:layer:chrome-aws-lambda:50
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY
      - httpApi:
          path: /
          method: ANY

  # Scheduled function for member expiry check
  memberExpiryScheduler:
    handler: schedulers/memberExpiryScheduler.handler
    timeout: 30
    memorySize: 512
    events:
      - schedule:
          rate: cron(5 18 * * ? *)  # Runs at 12:05 AM IST (6:05 PM UTC + 5:30 = 12:05 AM IST)
          description: 'Daily member expiry check at 12:05 AM IST'
          enabled: true

plugins:
  - serverless-dotenv-plugin

package:
  patterns:
    - '!node_modules/.cache/**'
    - '!.git/**'
    - '!.gitignore'
    - '!README.md'
    - '!.env.example'
    - '!tests/**'
    - '!.vscode/**'
    - '!node_modules/aws-sdk/**'
